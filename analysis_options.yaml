# This file configures the Dart static analyzer to enforce modern industry-standard 
# best practices for Dart and Flutter. It ensures type safety (KISS), 
# prevents performance overhead (prefer_const), and enforces structured coding guidelines (SRP/DRY).
#
# For details, see: https://dart.dev/guides/language/analysis-options

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    # Strict language rules to prevent runtime crashes (type safety / compile-time assurance)
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  errors:
    # Treat critical code quality issues as warnings/errors so they are resolved before shipping
    missing_required_param: error
    missing_return: error
    todo: ignore

linter:
  rules:
    # --- Performance & Optimization (DRY/Memory) ---
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    unnecessary_const: true
    prefer_final_fields: true # OOP Encapsulation

    # --- Style and Readability (KISS) ---
    prefer_single_quotes: true
    always_declare_return_types: true
    curly_braces_in_flow_control_structures: true
    unnecessary_new: true # Prevents deprecated/unneeded keywords
    unnecessary_brace_in_string_interps: true
    unnecessary_string_interpolations: true
    unnecessary_getters_setters: true

    # --- Code Safety & Memory Management (SRP/Safety) ---
    cancel_subscriptions: true # Crucial to prevent Stream leaks
    close_sinks: true # Crucial to prevent I/O and Sink leaks
    use_build_context_synchronously: true # Flutter async safety
    use_key_in_widget_constructors: true
    await_only_futures: true # Prevents redundant async/await boilerplate

    # --- Consistency ---
    avoid_relative_lib_imports: true # Forces consistent package imports
    camel_case_types: true
    camel_case_extensions: true
    non_constant_identifier_names: true
    prefer_is_empty: true
    prefer_is_not_empty: true
    prefer_iterable_whereType: true
