name: fifis_world_adventures
description: A magical adventure game for kids ages 4-8.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  audioplayers: ^6.0.0
  provider: ^6.1.2
  firebase_core: ^4.9.0
  firebase_database: ^12.4.1
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/home/
    - assets/images/tiger/
    - assets/images/firefly/
    - assets/images/bubble/
    - assets/images/stones/
    - assets/images/star/
    - assets/images/snake/
    - assets/images/treasure/
    - assets/images/characters/
    - assets/images/ui/
    - assets/audio/sfx/
    - assets/audio/music/

  fonts:
    - family: FifiRounded
      fonts:
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
